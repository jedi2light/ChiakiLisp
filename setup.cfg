[options]
packages = find:
scripts =
    chiakilang
python_requires = >=3.6

[options.package_data]
chiakilisp = corelib/core.cl

[metadata]
name = chiakilisp
version = 0.1.1
description = ChiakiLisp - yet another LISP syntax over Python 3
long_description = file: README.md
long_description_content_type = text/markdown
url = https://chiakilisp.jedi2light.moe
author = @jedi2light
author_email = stoyan.minaev@gmail.com
maintainer = @jedi2light
maintainer_email = stoyan.minaev@gmail.com
classifiers =
    Programming Language :: Python :: 3
    Operating System :: OS Independent
license = GNU GPL v2
project_urls =
    Documentation = https://chiakilisp.readthedocs.io/en/latest/
    Source = https://gitea.jedi2light.moe/jedi2light/chiakilisp.git/
    Bug Tracker = https://gitea.jedi2light.moe/jedi2light/chiakilisp/issues